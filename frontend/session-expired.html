<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired - VertexLearn AI</title>
    <meta name="description" content="Your session has expired. Please login again to continue.">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Core Style System -->
    <link rel="stylesheet" href="./assets/css/base/variables.css">
    <link rel="stylesheet" href="./assets/css/base/typography.css">
    <link rel="stylesheet" href="./assets/css/components/buttons.css">
    <link rel="stylesheet" href="./assets/css/components/animations.css">
    <link rel="stylesheet" href="./assets/css/components/utilities.css">
    <link rel="stylesheet" href="./assets/css/layout/layout.css">
    <link rel="stylesheet" href="./assets/css/themes/dark-theme.css">

    <!-- Page Specific Stylesheet -->
    <link rel="stylesheet" href="./assets/css/pages/session-expired.css">

    <script>
        (function() {
            const theme = localStorage.getItem('vertexlearn_theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body class="bg-primary">

    <div class="error-page-wrapper d-flex align-items-center justify-content-center flex-column text-center px-4">

        <!-- Animated Clock Icon -->
        <div class="session-icon-ring mb-5 animate-fade-in-up">
            <div class="session-icon-inner">
                <i class="bi bi-clock-history fs-1 text-warning"></i>
            </div>
        </div>

        <!-- Heading -->
        <div class="animate-fade-in-up" style="animation-delay: 0.1s;">
            <p class="error-code-label text-secondary-custom fw-semibold mb-2">Session Terminated</p>
            <h1 class="display-5 fw-bold mb-3" style="letter-spacing: -0.03em;">Session Expired</h1>
            <p class="text-secondary-custom mb-5 mx-auto" style="max-width: 440px; line-height: 1.7;">
                Your session has expired due to inactivity or a security refresh. Please sign in again to resume your workspace where you left off.
            </p>
        </div>

        <!-- Countdown indicator -->
        <p class="text-small text-secondary-custom mb-4 animate-fade-in-up" style="animation-delay: 0.15s;">
            Redirecting to login in <strong id="countdownNum" class="text-dark">10</strong> seconds...
        </p>

        <!-- Action Buttons -->
        <div class="d-flex flex-wrap gap-3 justify-content-center animate-fade-in-up" style="animation-delay: 0.2s;">
            <a href="index.html" class="btn btn-secondary-custom px-4">
                <i class="bi bi-house me-2"></i>Return Home
            </a>
            <a href="login.html" class="btn btn-primary px-5" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login Again
            </a>
        </div>

        <!-- Brand footer -->
        <div class="mt-5 pt-4 animate-fade-in-up" style="animation-delay: 0.3s;">
            <a href="index.html" class="text-decoration-none">
                <span class="fw-bold text-secondary-custom" style="letter-spacing: -0.02em;">VertexLearn<span class="text-primary">.AI</span></span>
            </a>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/pages/session-expired.js"></script>
</body>
</html>
