<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - VertexLearn AI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Style Sheet Foundation -->
    <link rel="stylesheet" href="./assets/css/base/variables.css">
    <link rel="stylesheet" href="./assets/css/base/typography.css">
    <link rel="stylesheet" href="./assets/css/components/buttons.css">
    <link rel="stylesheet" href="./assets/css/components/animations.css">
    <link rel="stylesheet" href="./assets/css/components/utilities.css">
    <link rel="stylesheet" href="./assets/css/layout/layout.css">
    <link rel="stylesheet" href="./assets/css/themes/dark-theme.css">
    <link rel="stylesheet" href="./assets/css/utilities/responsive.css">

    <script>
        (function() {
            const theme = localStorage.getItem('vertexlearn_theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body class="public-layout">

    <!-- Header -->
    <header class="public-header px-4 px-md-5">
        <a href="index.html" class="sidebar-brand text-decoration-none">
            <span class="fs-4 fw-bold" style="letter-spacing: -0.03em;">VertexLearn<span class="text-primary">.AI</span></span>
        </a>
        <button class="btn btn-ghost theme-toggle-btn px-2" id="themeToggleBtn" aria-label="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
    </header>

    <!-- Content -->
    <main class="public-content d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="text-center p-4">
            <div class="display-1 fw-bold text-primary mb-3" style="font-size: 6rem; letter-spacing: -0.05em;">404</div>
            <h1 class="h2 fw-bold mb-3">Lost in cyberspace?</h1>
            <p class="text-secondary mb-5 max-width-readable" style="max-width: 500px; margin: 0 auto;">
                The page you are looking for doesn't exist or has been relocated to another address.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <button onclick="history.back()" class="btn btn-secondary-custom btn-lg"><i class="bi bi-arrow-left"></i> Go Back</button>
                <a href="index.html" class="btn btn-primary btn-lg">Return Home</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="dashboard-footer mt-auto" style="border-top: 1px solid var(--border-color);">
        <div>&copy; 2026 VertexLearn AI. All rights reserved.</div>
        <div class="dashboard-footer-links">
            <a href="#">Help Center</a>
            <a href="#">Support</a>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { ThemeManager } from './assets/js/components/theme.js';
        
        ThemeManager.init();
        const toggleBtn = document.getElementById('themeToggleBtn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => ThemeManager.toggle());
        }
    </script>
</body>
</html>
