<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Maintenance - VertexLearn AI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Style Sheet Foundation -->
    <link rel="stylesheet" href="./assets/css/base/variables.css">
    <link rel="stylesheet" href="./assets/css/base/typography.css">
    <link rel="stylesheet" href="./assets/css/components/buttons.css">
    <link rel="stylesheet" href="./assets/css/components/animations.css">
    <link rel="stylesheet" href="./assets/css/layout/layout.css">
    <link rel="stylesheet" href="./assets/css/themes/dark-theme.css">

    <script>
        (function() {
            const theme = localStorage.getItem('vertexlearn_theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body class="public-layout">

    <header class="public-header px-4">
        <a href="index.html" class="sidebar-brand text-decoration-none">
            <span class="fs-4 fw-bold" style="letter-spacing: -0.03em;">VertexLearn<span class="text-primary">.AI</span></span>
        </a>
        <button class="btn btn-ghost theme-toggle-btn px-2" id="themeToggleBtn"><i class="bi bi-moon"></i></button>
    </header>

    <main class="public-content d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="text-center p-4">
            <div class="avatar-lg bg-warning-light text-warning d-flex align-items-center justify-content-center mx-auto mb-4 rounded-3" style="width: 72px; height: 72px;">
                <i class="bi bi-tools fs-1"></i>
            </div>
            <h1 class="h2 fw-bold mb-3">Scheduled Maintenance</h1>
            <p class="text-secondary mb-5" style="max-width: 500px; margin: 0 auto;">
                We are performing essential updates to improve your RAG AI Chat latency. We'll be back online shortly. Thank you for your patience.
            </p>
            <div class="text-xs text-muted-custom">
                Expected downtime: Less than 15 minutes.
            </div>
        </div>
    </main>

    <footer class="dashboard-footer mt-auto">
        <div>&copy; 2026 VertexLearn AI. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { ThemeManager } from './assets/js/components/theme.js';
        ThemeManager.init();
        document.getElementById('themeToggleBtn').addEventListener('click', () => ThemeManager.toggle());
    </script>
</body>
</html>
